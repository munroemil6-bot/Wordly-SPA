<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Wordly Dictionary</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="app">
    <h1>Wordly Dictionary</h1>

    <form id="searchForm">
      <input type="text" id="wordInput" placeholder="Search a word..." />
      <button type="submit">Search</button>
    </form>

    <p id="error"></p>

    <div id="result">
      <h2 id="word"></h2>
      <p id="phonetic"></p>

      <audio id="audio" controls></audio>

      <p id="definition"></p>
      <p id="example"></p>
      <p id="synonyms"></p>
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
